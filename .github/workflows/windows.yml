name: Windows

on:
  pull_request:
  workflow_call:

jobs:
  release:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Cache SDK
      uses: actions/cache@v4
      with:
        path: sdk
        key: friction-sdk-1.0.0r6-windows
    - name: Build
      shell: cmd
      env:
        GHA_RUN_NUMBER: ${{ github.run_number }}
        BUILD_ORIGIN: ci
      run: .\src\scripts\build.bat ci
    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: friction-ci-windows-x64-${{ github.sha }}
        path: |
          build\output\friction-*.7z
          build\output\friction-*.exe
