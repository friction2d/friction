name: macOS

on:
  push:
    branches:
      - main
      - v1.0
      - v1.1
  pull_request:
    branches:
      - main
      - v1.0
      - v1.1
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: ./src/scripts/build_mac_ci.sh
    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: friction-ci-macOS
        path: build-release-universal/*.dmg
